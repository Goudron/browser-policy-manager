<footer class="app-footer mt-4 pb-2">
    <div class="surface-panel rounded-[26px] px-4 py-4 shadow-soft">
        <p class="compact-footer">
            <span class="mr-2 text-slate-400">©</span>
            <span id="footer-year-range" class="font-medium text-slate-700">{{ footer_year_range }}</span>
            <span class="mx-2 text-slate-400">•</span>
            <span id="footer-owner" class="font-medium text-slate-700" data-i18n="profiles.footer_owner">{{ tr("profiles.footer_owner") }}</span>
            <span class="mx-2 text-slate-400">•</span>
            <span class="text-slate-600 compact-footer-license-prefix" data-i18n="profiles.footer_license_prefix">{{ tr("profiles.footer_license_prefix") }}</span>
            <a
                class="font-medium text-slate-700 underline decoration-slate-300 underline-offset-4 hover:text-slate-900 compact-footer-license-link"
                href="https://www.mozilla.org/MPL/2.0/"
                target="_blank"
                rel="noopener noreferrer"
                data-i18n="profiles.footer_license_label">{{ tr("profiles.footer_license_label") }}</a>
        </p>
    </div>
</footer>
