<header class="compact-toolbar surface-panel fade-up mb-4">
    <div class="compact-toolbar-main">
        <div class="compact-toolbar-brand">
            <div class="compact-toolbar-section" data-i18n="profiles.title">{{ tr("profiles.title") }}</div>
        </div>
        <h1 class="compact-toolbar-title text-slate-900">Browser Policy Manager</h1>
        <p class="compact-toolbar-subtitle" data-i18n="profiles.subtitle">
            {{ tr("profiles.subtitle") }}
        </p>
    </div>

    <div class="compact-toolbar-side">
        <div class="compact-counter compact-counter--pending">
            <strong id="workspace-profile-count" aria-hidden="true"></strong>
            <div class="compact-counter-meta">
                <span class="compact-counter-label" data-i18n="profiles.nav_library">{{ tr("profiles.nav_library") }}</span>
                <span id="workspace-profile-label" aria-hidden="true"></span>
            </div>
        </div>
        <div class="compact-toolbar-actions">
            <label class="compact-toolbar-control">
                <span class="compact-toolbar-copy">
                    <strong data-i18n="profiles.locale_label">{{ tr("profiles.locale_label") }}</strong>
                    <span data-i18n="profiles.locale_hint">{{ tr("profiles.locale_hint") }}</span>
                </span>
                <select id="lang" class="soft-input rounded-xl px-3 py-2 text-sm">
                    <option value="system" selected data-i18n="profiles.locale_system">{{ tr("profiles.locale_system") }}</option>
                    <option value="en" data-i18n="profiles.locale_option_en">{{ tr("profiles.locale_option_en", "English") }}</option>
                    <option value="ru" data-i18n="profiles.locale_option_ru">{{ tr("profiles.locale_option_ru", "Русский") }}</option>
                </select>
            </label>
            <label class="compact-toolbar-control">
                <span class="compact-toolbar-copy">
                    <strong data-i18n="profiles.theme_label">{{ tr("profiles.theme_label") }}</strong>
                    <span data-i18n="profiles.theme_hint">{{ tr("profiles.theme_hint") }}</span>
                </span>
                <select id="theme" class="soft-input rounded-xl px-3 py-2 text-sm">
                    <option value="system" selected data-i18n="profiles.theme_system">{{ tr("profiles.theme_system") }}</option>
                    <option value="light" data-i18n="profiles.theme_light">{{ tr("profiles.theme_light") }}</option>
                    <option value="dark" data-i18n="profiles.theme_dark">{{ tr("profiles.theme_dark") }}</option>
                </select>
            </label>
        </div>
    </div>
</header>
