<div class="save-conflict-panel surface-soft-box fade-up" id="save-conflict-panel" role="alert" aria-live="assertive" hidden>
    <div class="section-kicker" data-i18n="profiles.conflict_title">{{ tr("profiles.conflict_title") }}</div>
    <p class="save-conflict-copy" id="save-conflict-copy" data-i18n="profiles.conflict_body">{{ tr("profiles.conflict_body") }}</p>
    <p class="save-conflict-meta" id="save-conflict-meta"></p>
    <div class="save-conflict-actions">
        <button
            type="button"
            id="save-conflict-reload"
            class="button-base ghost-button"
            data-i18n="profiles.conflict_reload_latest">
            {{ tr("profiles.conflict_reload_latest") }}
        </button>
        <button
            type="button"
            id="save-conflict-save-copy"
            class="button-base ghost-button"
            data-i18n="profiles.conflict_save_as_copy">
            {{ tr("profiles.conflict_save_as_copy") }}
        </button>
        <button
            type="button"
            id="save-conflict-overwrite"
            class="button-base danger-button"
            data-i18n="profiles.conflict_overwrite">
            {{ tr("profiles.conflict_overwrite") }}
        </button>
    </div>
</div>
