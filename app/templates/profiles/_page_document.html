<!doctype html>
<html lang="{{ initial_lang }}">
<head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6efe4" />
    <link rel="icon" href="/favicon.ico?v={{ asset_version }}" sizes="any" />
    {% set profiles_asset_phase = "head" %}
    {% include "profiles/_page_route_assets.html" %}
</head>

<body class="app-body min-h-screen"
    data-initial-lang="{{ initial_lang }}"
    data-profiles-route-mode="{{ profiles_route_mode }}"
    data-profiles-template-kind="{{ profiles_template_kind }}"
    {% if return_url %}data-json-return-url="{{ return_url }}"{% endif %}
    {% if focus_target %}data-json-focus-target="{{ focus_target }}"{% endif %}
    {% if include_deleted %}data-include-deleted="true"{% endif %}
    {% if editing_profile_schema_version %}data-editing-profile-schema-version="{{ editing_profile_schema_version }}"{% endif %}
    {% if editing_profile_id is not none %}data-editing-profile-id="{{ editing_profile_id }}"{% endif %}
    {% if clone_source_id is not none %}data-clone-source-id="{{ clone_source_id }}"{% endif %}>
    {% include profiles_shell_template %}
    <script id="profiles-initial-locale" type="application/json">{{ initial_locale | tojson }}</script>
    {% if editing_profile_initial %}
    <script id="profiles-initial-profile" type="application/json">{{ editing_profile_initial | tojson }}</script>
    {% endif %}
    {% set profiles_asset_phase = "body" %}
    {% include "profiles/_page_route_assets.html" %}
</body>

</html>
