<div class="app-layout">
    <main class="workspace-column space-y-4">
        <div class="support-hidden">
            <input id="profile-owner" type="text" placeholder="{{ tr('profiles.owner_placeholder') }}"
                data-i18n-placeholder="profiles.owner_placeholder" />
            <textarea id="profile-description" placeholder="{{ tr('profiles.description_placeholder') }}"
                data-i18n-placeholder="profiles.description_placeholder"></textarea>
        </div>

        <div class="support-hidden" aria-live="polite">
            <div id="overview-status">{{ tr("profiles.signal_saved") }}</div>
            {% if profiles_template_kind == 'editor' %}
            <div id="status" data-i18n="profiles.workspace_ready">{{ tr("profiles.workspace_ready", "Workspace ready.") }}</div>
            {% endif %}
        </div>
    </main>
</div>
