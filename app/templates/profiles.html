<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6efe4" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <script>
        (function () {
            const storageKey = "bpm-theme-mode";
            const savedMode = localStorage.getItem(storageKey) || "system";
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const resolvedTheme = savedMode === "system" ? (prefersDark ? "dark" : "light") : savedMode;
            document.documentElement.dataset.themeMode = savedMode;
            document.documentElement.dataset.theme = resolvedTheme;
            const metaThemeColor = document.querySelector('meta[name="theme-color"]');
            if (metaThemeColor) {
                metaThemeColor.setAttribute("content", resolvedTheme === "dark" ? "#07111a" : "#f6efe4");
            }
        })();
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    boxShadow: {
                        panel: "0 28px 80px rgba(15, 23, 42, 0.10)",
                        soft: "0 18px 48px rgba(15, 23, 42, 0.08)",
                    },
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script>
        window.require = { paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs" } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.min.js"></script>

    <link rel="stylesheet" href="/static/profiles.css" />
</head>
