name: Firefox Live Policy Tests

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  firefox-live:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel:
          - release
          - esr

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Setup isolated Firefox sandbox
        run: |
          make setup-firefox-live-browsers FIREFOX_CHANNEL="${{ matrix.channel }}"

      - name: Run Firefox live tests
        run: |
          make test-firefox-live
