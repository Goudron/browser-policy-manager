name: CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify vendored frontend assets
        run: |
          test -f app/static/vendor/js-yaml.js
          test -f app/static/vendor/profiles_tailwind.css
          test -f app/static/vendor/profiles_monaco.js
          test -f app/static/vendor/profiles_monaco.css
          test -f app/static/vendor/monaco-editor.worker.js
          test -f app/static/vendor/monaco-json.worker.js
          test -f app/static/vendor/monaco.LICENSE

      - name: Ruff
        run: |
          ruff check .

      - name: Guard legacy schema refs
        run: |
          if grep -RInE \
            --exclude='20260330_upgrade_profiles_to_firefox149.py' \
            --exclude='20260423_upgrade_profiles_to_firefox150.py' \
            --exclude='ci.yml' \
            --exclude='test_migrations.py' \
            --exclude='test_no_legacy_schema_refs.py' \
            'release-148|release-149|esr-140\.8|esr-140\.9|firefox-release-148\.json|firefox-release-149\.json|firefox-esr-140\.8\.json|firefox-esr-140\.9\.json|firefox-esr140\.json|mozilla-policy-templates-v7\.8|mozilla-policy-templates-v7\.9|release148|release149' \
            app tests tools .github README.md; then
            echo "Legacy schema references found"
            exit 1
          fi

      - name: Mypy
        run: |
          mypy app

      - name: Pytest with coverage gate
        run: |
          pytest \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=85 \
            -W error::ResourceWarning

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn
