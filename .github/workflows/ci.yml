name: CI

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:
    inputs:
      run-browser-ui:
        description: "Run Chromium browser UI regression tests"
        required: false
        default: false
        type: boolean

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify vendored frontend assets
        run: |
          make verify-frontend-vendor

      - name: Ruff
        run: |
          make lint

      - name: Guard legacy schema refs
        run: |
          if grep -RInE \
            --exclude='20260330_upgrade_profiles_to_firefox149.py' \
            --exclude='20260423_upgrade_profiles_to_firefox150.py' \
            --exclude='20260521_upgrade_profiles_to_firefox151.py' \
            --exclude='ci.yml' \
            --exclude='test_migrations.py' \
            --exclude='test_no_legacy_schema_refs.py' \
            'release-148|release-149|release-150|esr-140\.8|esr-140\.9|esr-140\.10|firefox-release-148\.json|firefox-release-149\.json|firefox-release-150\.json|firefox-esr-140\.8\.json|firefox-esr-140\.9\.json|firefox-esr-140\.10\.json|firefox-esr140\.json|mozilla-policy-templates-v7\.8|mozilla-policy-templates-v7\.9|mozilla-policy-templates-v7\.10|release148|release149|release150|esr14010' \
            app tests tools .github README.md; then
            echo "Legacy schema references found"
            exit 1
          fi

      - name: Mypy
        run: |
          make typecheck

  fast-tests:
    name: Mandatory fast tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run fast marker layer
        run: |
          make test-fast

  coverage-and-contracts:
    name: Coverage and contract checks
    runs-on: ubuntu-latest
    needs:
      - lint
      - fast-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run non-browser contract layer
        run: |
          make test-contract

      - name: Run non-browser coverage gate
        run: |
          pytest \
            -o addopts= \
            -q \
            -m "not browser_ui and not firefox_live and not firefox_live_amo" \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=85 \
            -W error::ResourceWarning

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: warn

  browser-ui:
    name: Browser UI checks
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run-browser-ui }}
    needs:
      - lint
      - fast-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run browser UI marker layer
        run: |
          make test-ui
