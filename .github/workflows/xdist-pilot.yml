name: Pytest Xdist Pure Unit Pilot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pure-unit-xdist:
    name: Pure unit xdist pilot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pure unit xdist pilot
        run: |
          make test-unit-xdist XDIST_WORKERS=2
